name: Webhook Increment Epoch Diagnostic

on:
  workflow_dispatch:
    inputs:
      max_channels:
        description: "Increment channels up to this count"
        required: true
        default: "4"

      max_webhooks_per_channel:
        description: "Increment webhooks per channel up to this count"
        required: true
        default: "20"

      webhook_names:
        description: "Comma-separated names"
        required: false
        default: "Aarav, Vihaan, Arjun, Reyansh, Ayaan, Krishna, Ishaan, Kabir, Rohan, Aditya, Vivaan, Dhruv, Sai, Neil, Aryan, Anaya, Diya, Myra, Aadhya, Saanvi, Kiara, Avni, Isha, Tara, Meera, Nisha, Kavya, Riya, Siya, Anika, Maya, Zara, Neha, Priya, Aisha, Amara, Leela, Mira, Dev, Kian, Om, Yash, Nikhil, Rahul, Varun, Karan, Amit, Sohan, Arnav, Laksh"

      message_text:
        description: "Probe message text"
        required: false
        default: "rate diagnostic"

jobs:
  diagnose:
    runs-on: ubuntu-latest

    env:
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      DISCORD_CHANNEL_IDS: ${{ secrets.DISCORD_CHANNEL_IDS }}
      MAX_CHANNELS: ${{ github.event.inputs.max_channels }}
      MAX_WEBHOOKS_PER_CHANNEL: ${{ github.event.inputs.max_webhooks_per_channel }}
      WEBHOOK_NAMES: ${{ github.event.inputs.webhook_names }}
      MESSAGE_TEXT: ${{ github.event.inputs.message_text }}

    steps:
      - name: Run increment diagnostic
        run: |
          node <<'NODE'
          const token = process.env.DISCORD_BOT_TOKEN;

          const allChannels = [...new Set(
            (process.env.DISCORD_CHANNEL_IDS || "")
              .split(",")
              .map(x => x.trim())
              .filter(Boolean)
          )];

          const maxChannels = Number(process.env.MAX_CHANNELS || 1);
          const maxWebhooksPerChannel = Number(process.env.MAX_WEBHOOKS_PER_CHANNEL || 1);

          const channels = allChannels.slice(0, maxChannels);

          const names = (process.env.WEBHOOK_NAMES || "Aarav,Vihaan,Arjun")
            .split(",")
            .map(x => x.trim())
            .filter(Boolean);

          const messageText = process.env.MESSAGE_TEXT || "rate diagnostic";

          if (!token) throw new Error("Missing DISCORD_BOT_TOKEN");
          if (!channels.length) throw new Error("Missing DISCORD_CHANNEL_IDS");
          if (!names.length) throw new Error("Missing WEBHOOK_NAMES");

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          async function discordFetch(url, options = {}) {
            return fetch(url, {
              ...options,
              headers: {
                ...(options.headers || {}),
                "User-Agent": "webhook-increment-diagnostic"
              }
            });
          }

          async function parseBody(res) {
            const text = await res.text();
            try {
              return text ? JSON.parse(text) : null;
            } catch {
              return text || null;
            }
          }

          function rateInfo(res, body) {
            return {
              status: res.status,
              bucket: res.headers.get("x-ratelimit-bucket"),
              limit: Number(res.headers.get("x-ratelimit-limit") || 0),
              remaining: Number(res.headers.get("x-ratelimit-remaining") || 0),
              resetAfter: Number(res.headers.get("x-ratelimit-reset-after") || 0),
              retryAfter: Number(res.headers.get("retry-after") || body?.retry_after || 0),
              scope: res.headers.get("x-ratelimit-scope"),
              globalHeader: res.headers.get("x-ratelimit-global"),
              globalBody: body?.global
            };
          }

          function log(obj) {
            console.log(Object.entries(obj).map(([k, v]) => `${k}=${v ?? ""}`).join(" | "));
          }

          async function waitFrom429(info, action) {
            if (info.status !== 429) return false;

            const wait = info.retryAfter || info.resetAfter || 1;

            log({
              event: "429",
              action,
              waitSeconds: wait,
              scope: info.scope,
              globalHeader: info.globalHeader,
              globalBody: info.globalBody
            });

            await sleep(Math.ceil(wait * 1000));
            return true;
          }

          async function listWebhooks(channelId) {
            const res = await discordFetch(`https://discord.com/api/v10/channels/${channelId}/webhooks`, {
              headers: { Authorization: `Bot ${token}` }
            });

            const body = await parseBody(res);

            if (!res.ok) {
              throw new Error(`list failed channel=${channelId} status=${res.status} body=${JSON.stringify(body)}`);
            }

            return body || [];
          }

          async function deleteWebhook(id) {
            while (true) {
              const res = await discordFetch(`https://discord.com/api/v10/webhooks/${id}`, {
                method: "DELETE",
                headers: { Authorization: `Bot ${token}` }
              });

              const body = await parseBody(res);
              const info = rateInfo(res, body);

              if (await waitFrom429(info, "delete")) continue;

              return res.ok || res.status === 204 || res.status === 404;
            }
          }

          async function deleteAllInChannel(channelId) {
            const hooks = await listWebhooks(channelId);

            log({
              event: "cleanup_start",
              channel: channelId,
              existingWebhooks: hooks.length
            });

            for (const hook of hooks) {
              await deleteWebhook(hook.id);
              log({
                event: "deleted_existing",
                channel: channelId,
                webhook: hook.name,
                webhookId: hook.id
              });
            }

            log({
              event: "cleanup_done",
              channel: channelId
            });
          }

          async function createWebhook(channelId, name) {
            while (true) {
              const res = await discordFetch(`https://discord.com/api/v10/channels/${channelId}/webhooks`, {
                method: "POST",
                headers: {
                  Authorization: `Bot ${token}`,
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({ name })
              });

              const body = await parseBody(res);
              const info = rateInfo(res, body);

              if (await waitFrom429(info, "create")) continue;

              if (!res.ok) {
                log({
                  event: "create_failed",
                  channel: channelId,
                  name,
                  status: res.status,
                  body: JSON.stringify(body)
                });
                return null;
              }

              if (body.token) console.log(`::add-mask::${body.token}`);

              const url = `https://discord.com/api/v10/webhooks/${body.id}/${body.token}`;
              console.log(`::add-mask::${url}`);

              log({
                event: "created",
                channel: channelId,
                name,
                webhookId: body.id
              });

              return {
                channelId,
                name,
                id: body.id,
                token: body.token,
                url
              };
            }
          }

          async function sendProbe(webhook, epoch, channelCount, webhooksPerChannel) {
            const started = Date.now();

            const res = await discordFetch(webhook.url, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                content: `${messageText} | epoch=${epoch} | channel=${webhook.channelId} | webhook=${webhook.name}`
              })
            });

            const elapsedMs = Date.now() - started;
            const body = await parseBody(res);
            const info = rateInfo(res, body);

            const estimatedWebhookMsgPerSec =
              info.limit && info.resetAfter
                ? info.limit / info.resetAfter
                : 0;

            log({
              event: "probe",
              epoch,
              channels: channelCount,
              webhooksPerChannel,
              channel: webhook.channelId,
              webhook: webhook.name,
              status: info.status,
              bucket: info.bucket,
              limit: info.limit,
              remaining: info.remaining,
              resetAfter: info.resetAfter,
              estimatedSameWebhookMsgPerSec: estimatedWebhookMsgPerSec.toFixed(3),
              scope: info.scope,
              globalHeader: info.globalHeader,
              globalBody: info.globalBody,
              retryAfter: info.retryAfter,
              elapsedMs
            });

            return {
              ...info,
              estimatedWebhookMsgPerSec
            };
          }

          async function runEpoch(epoch, channelCount, webhooksPerChannel) {
            const selectedChannels = channels.slice(0, channelCount);
            const created = [];

            log({
              event: "epoch_start",
              epoch,
              channels: channelCount,
              webhooksPerChannel,
              intendedTotalWebhooks: channelCount * webhooksPerChannel,
              intendedProbeMessages: channelCount * webhooksPerChannel
            });

            try {
              for (const channelId of selectedChannels) {
                for (let i = 0; i < webhooksPerChannel; i++) {
                  const baseName = names[i % names.length];
                  const name = `${baseName}-e${epoch}-c${channelCount}-w${i + 1}`;

                  const hook = await createWebhook(channelId, name);
                  if (hook) created.push(hook);
                }
              }

              if (!created.length) {
                log({
                  event: "epoch_stop",
                  epoch,
                  reason: "no_webhooks_created"
                });
                return true;
              }

              const batchStart = Date.now();

              const results = await Promise.all(
                created.map(hook => sendProbe(hook, epoch, channelCount, webhooksPerChannel))
              );

              const wallMs = Date.now() - batchStart;

              const ok = results.filter(r => r.status >= 200 && r.status < 300).length;
              const limited = results.filter(r => r.status === 429).length;

              const globalDetected = results.some(r =>
                r.scope === "global" ||
                r.globalHeader === "true" ||
                r.globalBody === true
              );

              const perWebhookEstimate = results
                .filter(r => r.estimatedWebhookMsgPerSec > 0)
                .map(r => r.estimatedWebhookMsgPerSec);

              const avgPerWebhookEstimate =
                perWebhookEstimate.length
                  ? perWebhookEstimate.reduce((a, b) => a + b, 0) / perWebhookEstimate.length
                  : 0;

              const estimatedCombinedMsgPerSec =
                avgPerWebhookEstimate * created.length;

              const observedProbeMsgPerSec =
                wallMs ? ok / (wallMs / 1000) : 0;

              log({
                event: "epoch_summary",
                epoch,
                channels: channelCount,
                webhooksPerChannel,
                totalWebhooks: created.length,
                probeMessages: results.length,
                ok,
                limited,
                globalDetected,
                avgSameWebhookMsgPerSecFromHeaders: avgPerWebhookEstimate.toFixed(3),
                estimatedCombinedMsgPerSecFromHeaders: estimatedCombinedMsgPerSec.toFixed(3),
                observedProbeMsgPerSec: observedProbeMsgPerSec.toFixed(3),
                wallMs
              });

              if (limited > 0) {
                log({
                  event: "stop",
                  epoch,
                  reason: "429_seen"
                });
                return true;
              }

              return false;

            } finally {
              for (const hook of created) {
                await deleteWebhook(hook.id);
                log({
                  event: "deleted_epoch_webhook",
                  epoch,
                  channel: hook.channelId,
                  webhook: hook.name,
                  webhookId: hook.id
                });
              }
            }
          }

          console.log("selected_channels:", channels.join(", "));
          console.log("max_channels:", maxChannels);
          console.log("max_webhooks_per_channel:", maxWebhooksPerChannel);

          console.log("\nDELETE ALL EXISTING WEBHOOKS FIRST");
          for (const channelId of channels) {
            await deleteAllInChannel(channelId);
          }

          let epoch = 1;

          /*
            Correct increment model:

            1 channel:
              epoch 1: 1 webhook
              epoch 2: 2 webhooks
              epoch 3: 3 webhooks
              ...

            2 channels:
              next epoch: 2 channels × 1 webhook
              next epoch: 2 channels × 2 webhooks
              ...

            3 channels:
              next epoch: 3 channels × 1 webhook
              ...
          */

          for (let channelCount = 1; channelCount <= channels.length; channelCount++) {
            for (let webhooksPerChannel = 1; webhooksPerChannel <= maxWebhooksPerChannel; webhooksPerChannel++) {
              const shouldStop = await runEpoch(epoch, channelCount, webhooksPerChannel);
              epoch++;

              if (shouldStop) {
                console.log("stopped=true");
                console.log("\nFINAL CLEANUP");
                for (const channelId of channels) {
                  await deleteAllInChannel(channelId);
                }
                process.exit(0);
              }
            }
          }

          console.log("\nFINAL CLEANUP");
          for (const channelId of channels) {
            await deleteAllInChannel(channelId);
          }

          console.log("done=true");
          NODE
