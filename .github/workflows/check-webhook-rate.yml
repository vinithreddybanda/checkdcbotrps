name: Create Named Webhooks And Send

on:
  workflow_dispatch:
    inputs:
      webhook_names:
        description: "Comma-separated names. 1 name = 1 webhook."
        required: false
        default: "Aarav, Vihaan, Arjun, Reyansh, Ayaan, Krishna, Ishaan, Kabir, Rohan, Aditya, Vivaan, Dhruv, Sai, Neil, Aryan, Anaya, Diya, Myra, Aadhya, Saanvi, Kiara, Avni, Isha, Tara, Meera, Nisha, Kavya, Riya, Siya, Anika, Maya, Zara, Neha, Priya, Aisha, Amara, Leela, Mira, Dev, Kian, Om, Yash, Nikhil, Rahul, Varun, Karan, Amit, Sohan, Arnav, Laksh
"

      messages_per_webhook:
        description: "How many messages each webhook should send"
        required: true
        default: "5"

      delay_ms:
        description: "Delay between messages per webhook in ms. Use 0 for no manual delay."
        required: true
        default: "0"

      message_text:
        description: "Message text"
        required: false
        default: "test message"

      cleanup_webhooks:
        description: "Delete created webhooks after sending? true/false"
        required: false
        default: "true"

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      DISCORD_CHANNEL_IDS: ${{ secrets.DISCORD_CHANNEL_IDS }}
      WEBHOOK_NAMES: ${{ github.event.inputs.webhook_names }}
      MESSAGES_PER_WEBHOOK: ${{ github.event.inputs.messages_per_webhook }}
      DELAY_MS: ${{ github.event.inputs.delay_ms }}
      MESSAGE_TEXT: ${{ github.event.inputs.message_text }}
      CLEANUP_WEBHOOKS: ${{ github.event.inputs.cleanup_webhooks }}

    steps:
      - name: Create webhooks from names and send
        run: |
          node <<'NODE'
          const token = process.env.DISCORD_BOT_TOKEN;

          const channelIds = [...new Set(
            (process.env.DISCORD_CHANNEL_IDS || "")
              .split(",")
              .map(x => x.trim())
              .filter(Boolean)
          )];

          const names = (process.env.WEBHOOK_NAMES || "vinith,vikkky,vinod,vishnu,webhook5")
            .split(",")
            .map(x => x.trim())
            .filter(Boolean);

          const messagesPerWebhook = Number(process.env.MESSAGES_PER_WEBHOOK || 5);
          const delayMs = Number(process.env.DELAY_MS || 0);
          const messageText = process.env.MESSAGE_TEXT || "test message";
          const cleanupWebhooks = String(process.env.CLEANUP_WEBHOOKS || "true").toLowerCase() === "true";

          if (!token) throw new Error("Missing DISCORD_BOT_TOKEN secret");
          if (!channelIds.length) throw new Error("Missing DISCORD_CHANNEL_IDS secret");
          if (!names.length) throw new Error("WEBHOOK_NAMES must contain at least one name");
          if (!Number.isFinite(messagesPerWebhook) || messagesPerWebhook < 1) {
            throw new Error("MESSAGES_PER_WEBHOOK must be >= 1");
          }
          if (!Number.isFinite(delayMs) || delayMs < 0) {
            throw new Error("DELAY_MS must be >= 0");
          }

          const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

          async function discordFetch(url, options = {}) {
            return fetch(url, {
              ...options,
              headers: {
                ...(options.headers || {}),
                "User-Agent": "named-webhook-runner"
              }
            });
          }

          async function parseResponse(res) {
            const text = await res.text();

            try {
              return text ? JSON.parse(text) : null;
            } catch {
              return text || null;
            }
          }

          async function createWebhook(channelId, name) {
            const res = await discordFetch(
              `https://discord.com/api/v10/channels/${channelId}/webhooks`,
              {
                method: "POST",
                headers: {
                  "Authorization": `Bot ${token}`,
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({ name })
              }
            );

            const body = await parseResponse(res);

            if (!res.ok) {
              throw new Error(
                `Create webhook failed | channel=${channelId} | name=${name} | status=${res.status} | body=${JSON.stringify(body)}`
              );
            }

            if (body.token) {
              console.log(`::add-mask::${body.token}`);
            }

            const url = `https://discord.com/api/v10/webhooks/${body.id}/${body.token}`;
            console.log(`::add-mask::${url}`);

            return {
              channelId,
              name,
              id: body.id,
              token: body.token,
              url
            };
          }

          async function deleteWebhook(webhook) {
            await discordFetch(
              `https://discord.com/api/v10/webhooks/${webhook.id}`,
              {
                method: "DELETE",
                headers: {
                  "Authorization": `Bot ${token}`
                }
              }
            ).catch(() => {});
          }

          async function sendWebhook(webhook, messageNumber) {
            const res = await discordFetch(webhook.url, {
              method: "POST",
              headers: {
                "Content-Type": "application/json"
              },
              body: JSON.stringify({
                content: `${messageText} | channel=${webhook.channelId} | webhook=${webhook.name} | message=${messageNumber}`
              })
            });

            const body = await parseResponse(res);

            const bucket = res.headers.get("x-ratelimit-bucket");
            const limit = res.headers.get("x-ratelimit-limit");
            const remaining = res.headers.get("x-ratelimit-remaining");
            const resetAfter = res.headers.get("x-ratelimit-reset-after");
            const retryAfterHeader = res.headers.get("retry-after");
            const scope = res.headers.get("x-ratelimit-scope");
            const globalHeader = res.headers.get("x-ratelimit-global");

            console.log([
              `channel=${webhook.channelId}`,
              `webhook=${webhook.name}`,
              `message=${messageNumber}`,
              `status=${res.status}`,
              `bucket=${bucket}`,
              `limit=${limit}`,
              `remaining=${remaining}`,
              `resetAfter=${resetAfter}`,
              `scope=${scope}`,
              `globalHeader=${globalHeader}`,
              `globalBody=${body && typeof body === "object" ? body.global : ""}`,
              `retryAfter=${retryAfterHeader || (body && typeof body === "object" ? body.retry_after : "") || ""}`
            ].join(" | "));

            if (res.status === 429) {
              const retryAfter =
                Number(body && typeof body === "object" ? body.retry_after : 0) ||
                Number(retryAfterHeader) ||
                Number(resetAfter) ||
                1;

              console.log(`429 received. Waiting ${retryAfter}s as required by Discord.`);
              await sleep(Math.ceil(retryAfter * 1000));
              return false;
            }

            return res.ok;
          }

          async function runWebhook(webhook) {
            for (let i = 1; i <= messagesPerWebhook; i++) {
              await sendWebhook(webhook, i);

              if (delayMs > 0 && i < messagesPerWebhook) {
                await sleep(delayMs);
              }
            }
          }

          async function runChannel(channelId) {
            const webhooks = [];

            try {
              console.log(`\nChannel ${channelId}`);
              console.log(`Creating ${names.length} webhooks from names: ${names.join(", ")}`);

              for (const name of names) {
                const webhook = await createWebhook(channelId, name);
                webhooks.push(webhook);

                console.log([
                  `created=true`,
                  `channel=${channelId}`,
                  `webhook=${name}`,
                  `webhook_id=${webhook.id}`
                ].join(" | "));
              }

              console.log(`Starting all ${webhooks.length} webhooks in channel ${channelId} at once.`);

              await Promise.all(
                webhooks.map(webhook => runWebhook(webhook))
              );

              console.log(`Finished channel ${channelId}`);

            } finally {
              if (cleanupWebhooks) {
                console.log(`Cleaning up webhooks for channel ${channelId}`);

                for (const webhook of webhooks) {
                  await deleteWebhook(webhook);
                  console.log(`deleted=true | channel=${channelId} | webhook=${webhook.name} | webhook_id=${webhook.id}`);
                }
              } else {
                console.log(`cleanup_webhooks=false, keeping webhooks for channel ${channelId}`);
              }
            }
          }

          console.log("Channels:", channelIds.join(", "));
          console.log("Webhook names:", names.join(", "));
          console.log("Messages per webhook:", messagesPerWebhook);
          console.log("Delay ms:", delayMs);
          console.log("Cleanup webhooks:", cleanupWebhooks);
          console.log("Starting all channels at once.");

          await Promise.all(
            channelIds.map(channelId => runChannel(channelId))
          );

          console.log("\nDone.");
          NODE
